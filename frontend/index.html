<!DOCTYPE html>
<html>
<head>
<title>Quotes Chatbot</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="chat-container">

<div class="chat-header">
<h3>Quotes Chatbot</h3>
<p>Ask for inspiration, motivation, success, love, or humor.</p>
</div>

<div id="chatbox" class="chat-box">
<div class="bot-message">
Hi, I am your Quotes Recommendation Chatbot. Ask me for a quote by mood or category.
</div>
</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let userInput = document.getElementById("userInput").value;

fetch("/get",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:userInput})
})

.then(response=>response.json())

.then(data=>{

let chatbox=document.getElementById("chatbox")

chatbox.innerHTML += `<div class="user-message">${userInput}</div>`

chatbox.innerHTML += `<div class="bot-message">${data.reply}</div>`

document.getElementById("userInput").value=""

chatbox.scrollTop = chatbox.scrollHeight

})

}

</script>

</body>
</html>
